project:
  type: website
  execute-dir: project
  output-dir: docs
  render:
    - "*.qmd"

execute: 
  freeze: auto

website:
  title: "Ann's Website"
  repo-url: https://github.com/annholmes
  navbar:
    background: primary
    left:
      - text: "Home"
        href: index.qmd
    right: 
      - text: "About"
        href: about.qmd
      - icon: github
        href: https://github.com/annholmes
  page-footer: 
    center: "Copyright &copy; 2026, Ann Holmes"
    background: secondary

format:
  html:
    theme:
      light: theme_light.scss
      dark: theme_dark.scss
    mainfont: Open Sans
    toc: true
    link-external-newwindow: true
    link-external-icon: false
